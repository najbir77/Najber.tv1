<!DOCTYPE html>

<head>

    <style>
        body { background: linear-gradient(to bottom, #000000, #5c0000); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #login-part { background: rgba(0, 0, 0, 0.6); padding: 30px; border-radius: 20px; width: 300px; text-align: center; border: 1px solid #ff4d4d; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #333; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }

<div id="login-part">

<script>
// ئەڤ سکریپتە دێ کەنالان ژ سێرڤەری ڕاکێشیت
async function loadChannels(username, password) {
    const host = "http://new-pro.tv:8080";
    const api = `${host}/player_api.php?username=${username}&password=${password}&action=get_live_categories`;
    
    try {
        let response = await fetch(api);
        let data = await response.json();
        
        let container = document.getElementById('channel-container');
        data.forEach(cat => {
            container.innerHTML += `<div style="background: #333; color: white; padding: 15px; border-radius: 8px;">${cat.category_name}</div>`;
        });
    } catch(e) {
        alert("کەنال نەهاتنە ڕاکێشان!");
    }
}
</script>
