<!DOCTYPE html>
<html dir="rtl">
<head>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .box { background: #161b22; padding: 30px; border-radius: 20px; border: 1px solid #30363d; margin-top: 50px; }
        input { width: 80%; padding: 15px; border-radius: 10px; border: 1px solid #30363d; background: #0d1117; color: white; margin-bottom: 20px; }
        button { width: 85%; padding: 15px; background: #238636; border: none; border-radius: 10px; color: white; font-size: 18px; cursor: pointer; }
        a { color: #58a6ff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h1>NajberTV</h1>
    <p>ب خێر بێن بۆ ئەپێ NajberTV</p>
    <input type="password" id="pass" placeholder="پاسۆردی بنڤیسه">
    <button onclick="check()">چوونە ناڤ</button>
    <p id="msg" style="margin-top:20px;"></p>
</div>

<script>
    function check() {
        var p = document.getElementById("pass").value;
        if (p == "123") { // پاسۆردێ خۆ ل جهێ 123 دانی
            window.location.href = "https://www.google.com"; // ل جهێ گوگل لینکا کەنالێن خۆ دانی
        } else {
            document.getElementById("msg").innerHTML = "پاسۆردێ تە یێ چەوتە!<br><br>بۆ کرینا کودی پەیوەندیێ ب واتساپێ بکە:<br><a href='https://wa.me/9647501020015'>07501020015</a>";
        }
    }
</script>

</body>
</html>
