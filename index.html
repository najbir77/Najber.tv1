<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .category { margin: 20px 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .box { background: #1a1a1a; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .logo { width: 40px; display: block; margin: 0 auto 5px; }
        #login { padding: 50px; text-align: center; }
    </style>
</head>
<body>

<div id="login">
    <input type="password" id="p" placeholder="پاسۆرد">
    <button onclick="go()">چوونە ژۆر</button>
</div>

<div id="app" style="display:none;">
    <div class="category">
        <h3>beIN Sport</h3>
        <div class="grid">
            <div class="box" onclick="location.href='LINK_BEIN'">
                <img src="https://cdn-icons-png.flaticon.com/512/3067/3067401.png" class="logo">
                beIN 1
            </div>
        </div>
    </div>

    <div class="category">
        <h3>Alwan Sport</h3>
        <div class="grid">
            <div class="box" onclick="location.href='LINK_ALWAN'">
                <img src="https://cdn-icons-png.flaticon.com/512/3067/3067401.png" class="logo">
                Alwan 1
            </div>
        </div>
    </div>

    <div class="category">
        <h3>کەنالێن کوردی</h3>
        <div class="grid">
            <div class="box" onclick="location.href='LINK_RUDAW'">روداو</div>
            <div class="box" onclick="location.href='LINK_NRT'">NRT</div>
        </div>
    </div>
</div>

<script>
    function go() {
        if(document.getElementById('p').value == "1234") { 
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        } else { alert("پاسۆردێ تە خەلەتە!"); }
    }
</script>
</body>
</html>
