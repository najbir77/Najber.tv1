<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: linear-gradient(to bottom, #000000, #5c0000); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #login-part { background: rgba(0, 0, 0, 0.6); padding: 30px; border-radius: 20px; width: 300px; text-align: center; border: 1px solid #ff4d4d; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #333; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .error { color: #ff4d4d; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="login-part">
    <h2>NajberTV</h2>
    <input type="text" id="username" placeholder="Add your username">
    <input type="password" id="password" placeholder="Add your password">
    <button onclick="check()">Login</button>
    <div id="msg" class="error"></div>
</div>

<div id="content-part" style="display: none; text-align: center;">
    <h1>بخێر هاتی بۆ NajberTV</h1>
</div>
<div id="content-part" style="display: none; text-align: center; color: white; padding: 20px;">
    <h1>کەناڵەکانت ئامادەن</h1>
    <div style="background: #1a2533; padding: 20px; border-radius: 10px;">
        <p>بۆ تاقیکردنی پەخشی ڕاستەوخۆ، ئەم لینکە بەکاربهێنە:</p>
        <a href="http://new-pro.tv:8080/live/teet62728/4527288880807/playlist.m3u8" style="color: #00d4ff; font-weight: bold;">کلیک بکە بۆ بینینی پەخشی کەناڵەکان</a>
    </div>
</div>
    
<script>
    function check() {
        var user = document.getElementById('username').value;
        var pass = document.getElementById('password').value;
        
        // ڤان زانیاریان تە ل سەرێ دابوون
        if (user === "teet62728" && pass === "4527288880807") {
            document.getElementById('login-part').style.display = 'none';
            document.getElementById('content-part').style.display = 'block';
        } else {
            // ئەڤە پەیاما بێدەنگ ل سەر شاشێ
            document.getElementById('msg').innerHTML = "یوزر یان پاسۆردێ تە یێ خەلەتە!";
        }
    }
</script>

</body>
</html>
