<!DOCTYPE html>
<html>
<head>
    <title>Najber TV</title>
    <style>
        body { background-color: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        input { padding: 15px; border-radius: 8px; border: none; width: 80%; max-width: 300px; margin-bottom: 10px; }
        button { padding: 15px 30px; background-color: #e50914; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
        .test-btn { background-color: #333; }
    </style>
</head>
<body>
    <h1>Najber TV</h1>
    <p>پاسۆردی بنڤیسە یان تێستێ بکە</p>
    
    <input type="password" id="pass" placeholder="پاسۆرد">
    <br>
    <button onclick="check()">چوون</button>
    <button class="test-btn" onclick="startTrial()">تێست (15 دەقیقە)</button>

    <script>
        function check() {
            var p = document.getElementById("pass").value;
            if(p === "777" || p === "444") {
                window.location.href = "https://google.com";
            } else {
                alert("پاسۆرد خەلەتییە!");
            }
        }
        function startTrial() {
            alert("تێست دەست پێکر: 15 دەقیقە.");
            setTimeout(function() { alert("تێست ب دووماهی هات!"); window.location.reload(); }, 900000);
        }
    </script>
</body>
</html>
