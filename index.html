<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0c121c; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .box { background: #1a2533; padding: 20px; border-radius: 20px; border: 1px solid #00d4ff; max-width: 400px; margin: 50px auto; }
        input { padding: 15px; width: 80%; border-radius: 10px; border: none; margin-bottom: 20px; text-align: center; }
        button { padding: 15px 30px; background: #00d4ff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #0c121c; }
        #msg { margin-top: 15px; color: #ff4d4d; }
        a { color: #00d4ff; text-decoration: none; font-weight: bold; }
        /* دیزاینێ کەنالا */
        .app-content { padding: 20px; display: none; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .card { background: #238636; padding: 15px; border-radius: 10px; color: white; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-part" class="box">
    <h2>NajberTV</h2>
    <input type="password" id="pass" placeholder="پاسۆردی لێ بدە">
    <button onclick="check()">چوونە ناڤ</button>
    <p id="msg"></p>
    <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
    <p>بۆ کرینا کودی پەیوەندیێ ب واتساپێ بکە:</p>
    <a href="https://wa.me/9647501020015">07501020015</a>
</div>

<div id="content-part" class="app-content">
    <h1>کەنالێن NajberTV</h1>
    
    <h3>Local Sports (Kurdistan)</h3>
    <div class="grid">
        <div class="card">دهۆک سپۆرت</div>
        <div class="card">ناڤا سپۆرت</div>
        <div class="card">زاخۆ سپۆرت</div>
    </div>

    <h3>beIN Sports</h3>
    <div class="grid">
        <div class="card">beIN 1</div>
        <div class="card">beIN 2</div>
        <div class="card">beIN 3</div>
    </div>
</div>

<script>
    function check() {
        var p = document.getElementById("pass").value;
        if (p == "1234") {
            document.getElementById("login-part").style.display = "none";
            document.getElementById("content-part").style.display = "block";
        } else {
            document.getElementById("msg").innerHTML = "پاسۆردێ تە یێ خەلەتە!<br>پەیوەندیێ ب 07501020015 بکە.";
        }
    }
</script>

</body>
</html>
