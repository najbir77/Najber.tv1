<!DOCTYPE html>
<html dir="rtl">
<head>
    <style>
        body { background-color: #0c121c; color: white; text-align: center; padding-top: 50px; font-family: sans-serif; }
        .box { background: #1a2533; padding: 20px; border-radius: 10px; margin: 20px; border: 1px solid #00d4ff; }
    </style>
</head>
<body>
    <div class="box">
        <h3>پاسۆردێ بنڤیسه</h3>
        <input type="password" id="pass" placeholder="پاسۆردی لێ بدە">
        <button onclick="check()">OK</button>
    </div>
    <p id="msg"></p>

    <script>
        function check() {
            var p = document.getElementById("pass").value;
            if (p == "123") {
                location.reload(); // دێ پەیجێ ڤەکەت
            } else {
                document.getElementById("msg").innerHTML = "پاسۆردێ یێ خه له ته! تکایه بۆ کرینا کودی پەیوەندیێ ب ڤێ ژمارێ بکه: <br> <a href='https://wa.me/9647501020015'>07501020015</a>";
            }
        }
    </script>
</body>
</html>
