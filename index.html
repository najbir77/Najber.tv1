
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #0c121c; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 70px; }
        .app-content { padding: 15px; }
        .title { color: #00d4ff; margin: 20px 0 10px 5px; font-weight: bold; font-size: 15px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card { background: #1a2533; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #2d3e50; }
        .card-name { font-size: 11px; margin-top: 8px; color: #fff; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0c121c; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #2d3e50; color: #889; font-size: 12px; }
    </style>
</head>
<body>

<div class="app-content">
    <div class="title">World Cup Channels</div>
    <div class="grid">
        <div class="card"><div class="card-name">beIN Sports MAX 1</div></div>
        <div class="card"><div class="card-name">beIN Sports MAX 2</div></div>
        <div class="card"><div class="card-name">beIN Sports MAX 3</div></div>
    </div>

    <div class="title">Thamania</div>
    <div class="grid">
        <div class="card"><div class="card-name">Thamania 1</div></div>
        <div class="card"><div class="card-name">Thamania 2</div></div>
        <div class="card"><div class="card-name">Thamania 3</div></div>
    </div>

    <div class="title">StarzPlay Sports</div>
    <div class="grid">
        <div class="card"><div class="card-name">Sports 1</div></div>
        <div class="card"><div class="card-name">Sports 2</div></div>
        <div class="card"><div class="card-name">Sports 3</div></div>
    </div>

    <div class="title">Abu Dhabi Sport</div>
    <div class="grid">
        <div class="card"><div class="card-name">AD Sports 1</div></div>
        <div class="card"><div class="card-name">AD Sports 2</div></div>
        <div class="card"><div class="card-name">Premium 1</div></div>
    </div>

    <div class="title">کەنالێن گشتی</div>
    <div class="grid">
        <div class="card"><div class="card-name">beIN 1</div></div>
        <div class="card"><div class="card-name">Alwan 1</div></div>
        <div class="card"><div class="card-name">روداو</div></div>
    </div>
</div>

<div class="nav">
    <div>کۆد</div> <div>زنجیرە</div> <div>فیلم</div> <div>سەرەکی</div>
</div>

</body>
</html>
