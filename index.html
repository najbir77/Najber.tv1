<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        h1 { padding-top: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .box { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .box:hover { border-color: #e50914; }
        .logo { width: 60px; height: 60px; display: block; margin: 0 auto 10px; border-radius: 50%; }
        #login { padding: 50px; }
        input { padding: 12px; border-radius: 6px; border: none; width: 80%; margin-bottom: 10px; }
        button { padding: 12px 30px; background: #e50914; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login">
    <h2>Najber TV</h2>
    <input type="password" id="p" placeholder="پاسۆردێ بنڤیسە">
    <button onclick="go()">چوونە ژۆر</button>
</div>

<div id="app" style="display:none;">
    <h1>Najber TV</h1>
    <div class="grid" id="channel-list">
        </div>
</div>

<script>
    function go() {
        if(document.getElementById('p').value == "1234") { 
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        } else { alert("پاسۆردێ تە خەلەتە!"); }
    }
</script>
</body>
</html>
